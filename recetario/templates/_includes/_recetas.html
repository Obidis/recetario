


<article>
    <div class="bg-white border mt-2">
        <div>
            <div class="d-flex flex-row justify-content-between align-items-center p-2 border-bottom">
                <div class="d-flex flex-row align-items-center feed-text px-2"><img class="rounded-circle" src="{{ receta.user.profile.profile_picture.url }}" width="45">
                    <div class="d-flex flex-column flex-wrap ml-2">
                        <span class="font-weight-bold">{{ receta.user.first_name }}</span><span class="text-black-50 time">{{ receta.created_at }}</span>
                    </div>
                </div>
                <div class="feed-icon px-2">
                    <i class="fa fa-ellipsis-v text-black-50"></i>
                </div>
            </div>
        </div>
        <div class="feed-image p-2 px-3">
            <img class="img-fluid img-responsive" src="{{ receta.image.url }}"width="200">
        </div>
        <footer>
            
            <div class="text-center">
                
                <p class="text-center mt-3 mb-3">
                <a class="btn btn-primary btn-sm" role="button" href="{% url 'receta_detail' receta.pk %}">Ver receta</a>
                </p>
               
            </div>
        </footer>
    </div>

   
</article>
